name: iec
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10              # ← 3.8.5에서 변경
  - pip
  - pytorch=2.0.1            # ← 1.7.0에서 변경
  - torchvision=0.15.2       # ← 0.8.1에서 변경
  - pytorch-cuda=11.8        # ← cudatoolkit=11.0에서 변경 (이름도 바뀜)
  - numpy>=1.23,<1.26        # ← 1.19.2에서 변경
  - pip:
    - albumentations==1.3.1   # ← 0.4.3에서 변경 (numpy 호환)
    - opencv-python==4.8.0.74 # ← 4.1.2.30에서 변경 (Python 3.10 호환)
    - pudb                    # 버전 제약 제거
    - imageio==2.31.1         # ← 2.9.0에서 변경
    - imageio-ffmpeg==0.4.9   # ← 0.4.2에서 변경
    - pytorch-lightning==1.9.5 # ← 1.4.2에서 변경
    - omegaconf==2.3.0        # ← 2.1.1에서 변경
    - test-tube
    - streamlit
    - einops==0.6.1           # ← 0.3.0에서 변경
    - torch-fidelity==0.3.0   # 그대로
    - transformers==4.30.2    # ← 4.3.1에서 변경